<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>404 - Không tìm thấy trang</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { font-size: 80px; margin: 0; color: #667eea; }
        p { color: #64748b; margin: 20px 0; }
        a { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 12px 30px; border-radius: 40px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>⚠️ Error Loading!</p>
        <a href="/">← Về trang chủ</a>
    </div>
</body>
</html>
